services:
  - type: web
    name: skillspherex-backend
    env: node
    plan: free
    buildCommand: npm install && cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
